name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publishing + MCP registry GitHub OIDC

jobs:
  pypi:
    name: Publish to PyPI (Trusted Publishing)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/knowledgestack-mcp/
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  mcp-registry:
    name: Publish to MCP registry
    runs-on: ubuntu-latest
    needs: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Wait for PyPI to propagate
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/knowledgestack-mcp/${VERSION}/json")
            if [ "$code" = "200" ]; then echo "PyPI ready"; exit 0; fi
            echo "PyPI not ready yet (code=$code), sleeping..."
            sleep 10
          done
          echo "Timed out waiting for PyPI" >&2
          exit 1

      - name: Login via GitHub Actions OIDC
        run: mcp-publisher login github-oidc

      - name: Publish
        run: mcp-publisher publish
